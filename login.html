<!DOCTYPE html>
<html>
<head>

<title>Member Login</title>

<style>

body{
    font-family:Arial;
    background:#f4f7fa;
    margin:0;
}

header{
    background:#0066a1;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:500px;
    margin:40px auto;
}

.login-box{
    background:white;
    padding:30px;
    border-radius:8px;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:20px;
    box-sizing:border-box;
}

button{
    width:100%;
    background:#0066a1;
    color:white;
    border:none;
    padding:15px;
    font-size:16px;
}

</style>

</head>

<body>

<header>
<h1>Member Login</h1>
</header>

<div class="container">

<div class="login-box">

<form action="dashboard.html">

<label>Claim Reference</label>

<input
type="text"
id="claimId"
readonly>

<label>Member ID</label>

<input
type="text"
required>

<label>Password</label>

<input
type="password"
required>

<button type="submit">
Login
</button>

</form>

</div>

</div>

<script>

const params =
new URLSearchParams(window.location.search);

const claim =
params.get("claim");

document.getElementById("claimId").value =
claim;

</script>
    <script>
window.dataLayer = window.dataLayer || [];
   dataLayer.push({
  event: "login_page_view"
});
Login Success
dataLayer.push({
  event: "login_success",
  member_id: "UH123456789"
});
</script>

</body>
</html>
