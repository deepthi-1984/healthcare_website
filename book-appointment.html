<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>

<style>

body{
    font-family:Arial,sans-serif;
    background:#f4f7fa;
    margin:0;
}

header{
    background:#0066a1;
    color:white;
    text-align:center;
    padding:20px;
}

.container{
    width:90%;
    max-width:700px;
    margin:30px auto;
}

.form-box{
    background:white;
    padding:30px;
    border-radius:8px;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:20px;
    box-sizing:border-box;
}

button{
    background:#0066a1;
    color:white;
    border:none;
    padding:12px 20px;
    cursor:pointer;
    width:100%;
    font-size:16px;
}

</style>

</head>

<body>
<header>
<h1>Book Appointment</h1>
</header>

<div class="container">

<div class="form-box">

<h2>Appointment Request Form</h2>

<form action="payment.html">

<label>Patient Full Name</label>
<input type="text" required>

<label>Email Address</label>
<input type="email" required>

<label>Phone Number</label>
<input type="tel" required>

<label>Select Doctor</label>

<select required>
<option>Dr. Sarah Johnson - Cardiology</option>
<option>Dr. Michael Lee - Dermatology</option>
<option>Dr. Emily Davis - Pediatrics</option>
</select>

<label>Appointment Date</label>
<input type="date" required>

<label>Preferred Time</label>
<input type="time" required>

<label>Reason for Visit</label>
<textarea rows="5"></textarea>

<button type="submit">
Proceed to Insurance Verification & Payment
</button>

</form>

</div>

</div>
    <script>
window.dataLayer = window.dataLayer || [];
    dataLayer.push({
  event: "appointment_page_view"
});

dataLayer.push({
  event: "appointment_booked",
  doctor_name: "Dr. Sarah Johnson",
  specialty: "Cardiology",
  appointment_date: "2026-06-20"
});

</script>

</body>
</html>
