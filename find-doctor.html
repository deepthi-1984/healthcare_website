<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Find a Doctor</title>

<style>
body{
    font-family:Arial,sans-serif;
    margin:0;
    background:#f4f7fa;
}
header{
    background:#0066a1;
    color:white;
    padding:20px;
    text-align:center;
}
.container{
    width:90%;
    max-width:1200px;
    margin:30px auto;
}
.search-box{
    background:white;
    padding:20px;
    border-radius:8px;
    margin-bottom:25px;
}
input,select{
    width:100%;
    padding:12px;
    margin-top:10px;
    margin-bottom:15px;
}
button{
    background:#0066a1;
    color:white;
    border:none;
    padding:12px 20px;
    cursor:pointer;
}
.doctor-card{
    background:white;
    padding:20px;
    border-radius:8px;
    margin-bottom:20px;
}
a{
    text-decoration:none;
}
.btn{
    background:#0066a1;
    color:white;
    padding:10px 15px;
    display:inline-block;
}
</style>

</head>
<body>

<header>
<h1>Find a Doctor</h1>
</header>

<div class="container">

<div class="search-box">
<h2>Search Providers</h2>

<input type="text" placeholder="Search by Doctor Name">

<select id="specialty">

    <option value="">Select Specialty</option>

    <option value="cardiology">
        Cardiology
    </option>

    <option value="dermatology">
        Dermatology
    </option>

    <option value="pediatrics">
        Pediatrics
    </option>

</select>

<button onclick="findDoctor()">
    Search
</button>


<input type="text" placeholder="ZIP Code">

<button>Search</button>

</div>

<script>

function findDoctor(){

    const specialty =
        document.getElementById("specialty").value;

    if(specialty === "cardiology"){

        window.location.href =
            "doctor-details.html?doctor=cardiology";

    }

    else if(specialty === "dermatology"){

        window.location.href =
            "doctor-details.html?doctor=dermatology";

    }

    else if(specialty === "pediatrics"){

        window.location.href =
            "doctor-details.html?doctor=pediatrics";

    }

    else{

        alert("Please select a specialty");

    }

}

</script>

</div>
 <script>
window.dataLayer = window.dataLayer || [];
   dataLayer.push({
  event: "doctor_search_page_view"
});
dataLayer.push({
  event: "doctor_search",
  specialty: "Cardiology",
  zipcode: "43065"
});
dataLayer.push({
  event: "doctor_selected",
  doctor_name: "Dr. Sarah Johnson",
  specialty: "Cardiology"
});

</script>
</body>
</html>
