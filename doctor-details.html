<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Doctor Details</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/script.js"></script>
</head>
<body>
<header><h1>Doctor Details</h1>
<div id="doctorProfile"></div>

<script>

const params =
    new URLSearchParams(window.location.search);

const doctor =
    params.get("doctor");

let html = "";

if(doctor === "cardiology"){

html = `

<h2>Dr. Sarah Johnson, MD</h2>

<p><b>Specialty:</b> Cardiology</p>

<p><b>Experience:</b> 15 Years</p>

<p><b>Education:</b></p>

<ul>
<li>MD - Harvard Medical School</li>
<li>Cardiology Fellowship - Cleveland Clinic</li>
</ul>

<p><b>Certifications:</b></p>

<ul>
<li>Board Certified Cardiologist</li>
<li>ACLS Certified</li>
</ul>

<p><b>Responsibilities:</b></p>

<ul>
<li>Heart Disease Diagnosis</li>
<li>Cardiac Imaging Review</li>
<li>Treatment Planning</li>
<li>Preventive Care</li>
</ul>

<a href="book-appointment.html">
<button>
Book Appointment
</button>
</a>

`;

}

else if(doctor === "dermatology"){

html = `

<h2>Dr. Michael Lee, MD</h2>

<p><b>Specialty:</b> Dermatology</p>

<p><b>Experience:</b> 12 Years</p>

<p><b>Education:</b></p>

<ul>
<li>MD - Johns Hopkins University</li>
<li>Dermatology Residency - Mayo Clinic</li>
</ul>

<p><b>Responsibilities:</b></p>

<ul>
<li>Skin Disease Treatment</li>
<li>Cosmetic Procedures</li>
<li>Skin Cancer Screening</li>
</ul>

<a href="book-appointment.html">
<button>
Book Appointment
</button>
</a>

`;

}

else if(doctor === "pediatrics"){

html = `

<h2>Dr. Emily Davis, MD</h2>

<p><b>Specialty:</b> Pediatrics</p>

<p><b>Experience:</b> 10 Years</p>

<p><b>Education:</b></p>

<ul>
<li>MD - University of Michigan</li>
<li>Pediatric Residency - Nationwide Children's Hospital</li>
</ul>

<p><b>Responsibilities:</b></p>

<ul>
<li>Child Wellness Exams</li>
<li>Vaccinations</li>
<li>Growth Monitoring</li>
</ul>

<a href="book-appointment.html">
<button>
Book Appointment
</button>
</a>

`;

}

document.getElementById("doctorProfile").innerHTML =
    html;

</script>
     <script>
window.dataLayer = window.dataLayer || [];
   dataLayer.push({
  event: "doctor_profile_view",
  doctor_name: "Dr. Sarah Johnson",
  specialty: "Cardiology"
});
dataLayer.push({
  event: "appointment_start",
  doctor_name: "Dr. Sarah Johnson"
});


</script>
</header>
</body>
</html>
